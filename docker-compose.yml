services:
  server:
    build:
      context: ./server
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    networks:
      - todo-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  client:
    build:
      context: ./client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - todo-net

networks:
  todo-net:
    driver: bridge
